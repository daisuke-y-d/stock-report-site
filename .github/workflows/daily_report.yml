name: Daily Stock Report

on:
  schedule:
    # UTC 22:00 = 日本時間(JST) 翌7:00
    # (GitHub Actionsの無料枠では、混雑状況により数分〜十数分遅れることがあります)
    - cron: "0 23 * * *"
  workflow_dispatch: {}
    # ↑ Actionsの画面から手動で「Run workflow」を押してテスト実行できるようにする設定

permissions:
  contents: write
  # ↑ ワークフローがリポジトリに git push できるようにするための権限

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 必要なライブラリをインストール
        run: pip install -r requirements.txt

      - name: レポートを生成
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python fundamental_news_report.py

      - name: 変更をコミットしてGitHub Pagesへ公開
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs
          git diff --quiet --cached || git commit -m "レポート自動更新 $(date +'%Y-%m-%d')"
          git push
